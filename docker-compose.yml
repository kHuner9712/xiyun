services:
  nginx:
    image: nginx:1.25-alpine
    container_name: shopxo-nginx
    ports:
      - "${NGINX_BIND_HOST:-127.0.0.1}:${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./shopxo-backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - shopxo-net
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: shopxo-php
    volumes:
      - ./shopxo-backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - shopxo-net
    restart: unless-stopped

  mysql:
    image: mysql:5.7.44
    container_name: shopxo-mysql
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-13306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopxo_dev}
      MYSQL_CHARSET: ${MYSQL_CHARSET:-utf8mb4}
      MYSQL_COLLATION: ${MYSQL_COLLATION:-utf8mb4_general_ci}
    volumes:
      - shopxo-mysql-data:/var/lib/mysql
    networks:
      - shopxo-net
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION

  redis:
    image: redis:7-alpine
    container_name: shopxo-redis
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    networks:
      - shopxo-net
    restart: unless-stopped

networks:
  shopxo-net:
    driver: bridge

volumes:
  shopxo-mysql-data:
